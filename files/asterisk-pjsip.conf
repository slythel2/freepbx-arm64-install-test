# Fail2Ban filter for Asterisk 22 PJSIP authentication failures
# Optimized for modern PJSIP stack (res_pjsip/pjsip_distributor.c)
[Definition]

# Modern PJSIP format (Asterisk 18+, 21, 22) - from res_pjsip/pjsip_distributor.c
# Matches authentication failures and endpoint lookup failures
failregex = ^\[[^\]]+\] NOTICE\[\d+\]: res_pjsip/pjsip_distributor\.c:\d+ log_failed_request: Request '[^']+' from '[^']*<sip:[^@]+@<HOST>>' failed for '[^']+' \(callid: [^\)]+\) - Failed to authenticate.*$
            ^\[[^\]]+\] NOTICE\[\d+\]: res_pjsip/pjsip_distributor\.c:\d+ log_failed_request: Request '[^']+' from '[^']*<sip:[^@]+@<HOST>>' failed for '[^']+' \(callid: [^\)]+\) - No matching endpoint found.*$

# Legacy patterns (chan_sip, old PJSIP formats) - kept for backward compatibility
            ^.*SecurityEvent="(FailedACL|InvalidAccountID|ChallengeResponseFailed|InvalidPassword)".*RemoteAddress="IPV[46]/(UDP|TCP|TLS)/<HOST>/[0-9]+".*
            ^.*chan_sip\.c:.*Registration from '.*' failed for '<HOST>:[0-9]+' - Wrong password$
            ^.*chan_sip\.c:.*Registration from '.*' failed for '<HOST>:[0-9]+' - No matching peer found$
            ^.*chan_sip\.c:.*Registration from '.*' failed for '<HOST>:[0-9]+' - Username/auth name mismatch$
            ^.*chan_sip\.c:.*Host <HOST> failed to authenticate as .*$
            ^.*chan_sip\.c:.*No registration for peer .*\(IPaddr: <HOST>\).*$
            ^.*res_pjsip_registrar\.c.*Endpoint.*: Registration.*failed for '<HOST>.*' - Authentication failed.*$

ignoreregex =
